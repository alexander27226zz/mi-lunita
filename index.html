```html
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Lunita</title>

<style>

body{
background: linear-gradient(135deg,#2b0a3d,#4b1c6b,#1a0824);
min-height:100vh;
font-family:Georgia, serif;
margin:0;
padding:30px 15px;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:flex-start;
}

/* CARTA */

.carta{
background:white;
width:100%;
max-width:700px;
padding:40px;
border-radius:18px;
box-shadow:0 25px 60px rgba(0,0,0,0.6);
position:relative;
z-index:2;
}

/* TITULO */

.titulo{
text-align:center;
color:#e0aaff;
font-size:40px;
margin-bottom:10px;
text-shadow:0 0 10px #c77dff,0 0 20px #9d4edd;
}

.decoracion{
text-align:center;
color:#c77dff;
letter-spacing:10px;
margin-bottom:25px;
}

/* TEXTO */

.texto{
font-size:19px;
line-height:1.8;
text-align:justify;
white-space:pre-line;
color:#333;
}

/* FIRMA */

.firma{
text-align:right;
margin-top:40px;
font-size:22px;
color:#5a189a;
font-style:italic;
}

/* LUNA */

.luna{
position:fixed;
top:30px;
right:30px;
width:70px;
height:70px;
background:#f1e3ff;
border-radius:50%;
box-shadow:
0 0 20px #e0aaff,
0 0 40px #c77dff,
0 0 60px #9d4edd;
animation: brillo 4s ease-in-out infinite;
z-index:1;
}

@keyframes brillo{
0%{transform:scale(1);opacity:0.9;}
50%{transform:scale(1.1);opacity:1;}
100%{transform:scale(1);opacity:0.9;}
}

/* ESTRELLAS */

.estrellas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.estrella{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation: parpadear 3s infinite alternate;
}

@keyframes parpadear{
from{opacity:0.2;transform:scale(1);}
to{opacity:1;transform:scale(1.5);}
}

/* CORAZONES */

.corazon{
position:fixed;
top:-10px;
font-size:20px;
animation: caer linear infinite;
opacity:0.6;
}

@keyframes caer{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* AJUSTES PARA CELULAR */

@media (max-width:600px){

.carta{
padding:25px;
}

.titulo{
font-size:30px;
}

.texto{
font-size:16px;
line-height:1.7;
}

.firma{
font-size:18px;
}

.decoracion{
letter-spacing:6px;
}

.luna{
width:55px;
height:55px;
top:20px;
right:20px;
}

}

</style>

</head>

<body>

<div class="estrellas"></div>
<div class="luna"></div>

<div class="carta">

<h1 class="titulo">Mi Lunita 🌙</h1>

<div class="decoracion">❤ ❤ ❤</div>

<div class="texto" id="texto"></div>

<div class="firma">
Con amor 💜
</div>

</div>

<script>

let mensaje = `

Hay personas que llegan a la vida de uno sin hacer ruido,
pero poco a poco se convierten en alguien imposible de ignorar.

Tú eres exactamente eso.

Desde que apareciste, algo cambió.
No sé si fue tu forma de ser,
tu manera tan bonita de tratar a los demás,
o esa ternura que tienes en cada detalle.

Eres una persona cariñosa,
atenta, dulce y llena de pequeños gestos
que hacen que todo se sienta más especial.

De esas personas que recuerdan detalles,
que escuchan,
que hacen sentir importante a quien tienen cerca.

Y eso dice mucho del corazón tan bonito que tienes.

Tal vez no siempre lo notes,
pero tu forma de ser puede alegrar un día entero.

Porque tu ternura,
tu manera de cuidar a los demás
y tu forma de demostrar cariño
son cosas muy difíciles de encontrar.

Personas como tú
no aparecen todos los días.

Y por eso,
si alguna vez dudas de lo especial que eres,
recuerda algo muy simple:

tu forma de ser
ya hace este mundo
un lugar mucho más bonito.

`;

let i=0;

function escribir(){

if(i < mensaje.length){

document.getElementById("texto").innerHTML += mensaje.charAt(i);

i++;

setTimeout(escribir,35);

}

}

escribir();

function crearEstrellas(){

for(let i=0;i<120;i++){

let estrella=document.createElement("div");

estrella.classList.add("estrella");

estrella.style.top=Math.random()*100+"vh";
estrella.style.left=Math.random()*100+"vw";

estrella.style.animationDuration=(2+Math.random()*3)+"s";

document.querySelector(".estrellas").appendChild(estrella);

}

}

crearEstrellas();

function crearCorazon(){

let corazon=document.createElement("div");

corazon.classList.add("corazon");

corazon.innerHTML="💜";

corazon.style.left=Math.random()*100+"vw";

corazon.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},8000);

}

setInterval(crearCorazon,400);

</script>

</body>
</html>
```
